      <polygon points="0,56 3,20 -3,20" opacity="0.9"/>
      <polygon points="-56,0 -20,3 -20,-3" opacity="0.9"/>
      <polygon points="56,0 20,3 20,-3" opacity="0.9"/>

      <polygon points="-39.6,-39.6 -14.1,-14.1 -16.2,-12" opacity="0.85"/>
      <polygon points="39.6,-39.6 14.1,-14.1 16.2,-12" opacity="0.85"/>
      <polygon points="-39.6,39.6 -14.1,14.1 -12,16.2" opacity="0.85"/>
      <polygon points="39.6,39.6 14.1,14.1 12,16.2" opacity="0.85"/>

      <polygon points="-21.4,-52.4 -7.7,-18.8 -10,-17.8" opacity="0.75"/>
      <polygon points="21.4,-52.4 7.7,-18.8 10,-17.8" opacity="0.75"/>
      <polygon points="-52.4,-21.4 -18.8,-7.7 -17.8,-10" opacity="0.75"/>
      <polygon points="52.4,-21.4 18.8,-7.7 17.8,-10" opacity="0.75"/>
      <polygon points="-21.4,52.4 -7.7,18.8 -10,17.8" opacity="0.75"/>
      <polygon points="21.4,52.4 7.7,18.8 10,17.8" opacity="0.75"/>
      <polygon points="-52.4,21.4 -18.8,7.7 -17.8,10" opacity="0.75"/>
      <polygon points="52.4,21.4 18.8,7.7 17.8,10" opacity="0.75"/>

      <polygon points="-10.8,-55.4 -3.9,-19.9 -6.1,-19.5" opacity="0.6"/>
      <polygon points="10.8,-55.4 3.9,-19.9 6.1,-19.5" opacity="0.6"/>
      <polygon points="-55.4,-10.8 -19.9,-3.9 -19.5,-6.1" opacity="0.6"/>
      <polygon points="55.4,-10.8 19.9,-3.9 19.5,-6.1" opacity="0.6"/>
      <polygon points="-10.8,55.4 -3.9,19.9 -6.1,19.5" opacity="0.6"/>
      <polygon points="10.8,55.4 3.9,19.9 6.1,19.5" opacity="0.6"/>
      <polygon points="-55.4,10.8 -19.9,3.9 -19.5,6.1" opacity="0.6"/>
      <polygon points="55.4,10.8 19.9,3.9 19.5,6.1" opacity="0.6"/>

