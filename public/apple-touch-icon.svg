      <polygon points="-47,-31.4 -16.9,-11.3 -15.5,-13.2" opacity="0.65"/>
      <polygon points="47,-31.4 16.9,-11.3 15.5,-13.2" opacity="0.65"/>
      <polygon points="-31.4,47 -11.3,16.9 -13.2,15.5" opacity="0.65"/>
      <polygon points="31.4,47 11.3,16.9 13.2,15.5" opacity="0.65"/>
