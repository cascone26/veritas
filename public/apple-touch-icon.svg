  <!-- Outer ring of luna -->
  <circle cx="96" cy="72" r="22" fill="none" stroke="#d4a853" stroke-width="3"/>

  <!-- Inner host circle -->
  <circle cx="96" cy="72" r="16" fill="none" stroke="#d4a853" stroke-width="1.5"/>

  <!-- Small cross on the host -->
  <line x1="96" y1="64" x2="96" y2="80" stroke="#d4a853" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="88" y1="72" x2="104" y2="72" stroke="#d4a853" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Neck connecting luna to base -->
  <path d="M92,94 L92,130 Q92,133 89,136 L86,139 Q84,141 84,144 L84,148 L108,148 L108,144 Q108,141 106,139 L103,136 Q100,133 100,130 L100,94" fill="none" stroke="#d4a853" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- Node/knob on stem -->
  <ellipse cx="96" cy="112" rx="6" ry="4" fill="none" stroke="#d4a853" stroke-width="2"/>

  <!-- Base -->
  <path d="M78,148 L114,148 Q118,148 120,152 L122,156 Q123,160 119,162 L73,162 Q69,160 70,156 L72,152 Q74,148 78,148 Z" fill="none" stroke="#d4a853" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- Base bottom line -->
  <line x1="76" y1="162" x2="116" y2="162" stroke="#d4a853" stroke-width="2.5" stroke-linecap="round"/>
</svg>